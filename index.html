<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отсчет до Нового года</title>
<style>
:root{
  --bg:#0a0f1a;
  --bg-2:#0d1320;
  --card:rgba(255,255,255,0.05);
  --line:rgba(255,255,255,0.09);
  --text:rgba(255,255,255,0.98);
  --muted:rgba(255,255,255,0.46);
  --glow:rgba(162,191,255,0.22);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  overflow:hidden;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 50% -10%, rgba(122,162,255,0.12), transparent 60%),
    radial-gradient(700px 380px at 100% 0%, rgba(255,255,255,0.04), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg-2));
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(255,255,255,0.015), rgba(255,255,255,0.015)),
    linear-gradient(90deg, rgba(255,255,255,0.012), rgba(255,255,255,0.0) 18%, rgba(255,255,255,0.0) 82%, rgba(255,255,255,0.012));
  mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
  opacity:.7;
}

.wrap{
  width:min(1200px, calc(100vw - 32px));
  padding:24px;
}

.card{
  position:relative;
  border-radius:40px;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.03));
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:
    0 30px 80px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.05);
  padding:44px 42px 40px;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,0.09), transparent 35%, transparent 70%, rgba(255,255,255,0.03));
}

.title{
  margin:0 0 24px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
}

.timer{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:20px;
  align-items:end;
}

.unit{
  position:relative;
  text-align:center;
  padding:12px 8px;
}

.value-wrap{
  position:relative;
  height:140px;
  display:grid;
  place-items:center;
  overflow:hidden;
}

.value{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(52px, 9vw, 116px);
  line-height:.88;
  font-weight:700;
  letter-spacing:-0.08em;
  color:var(--text);
  text-shadow:
    0 0 24px var(--glow),
    0 0 56px rgba(162,191,255,0.08),
    0 10px 30px rgba(0,0,0,.28);
  will-change:transform, opacity, filter;
}

.value.enter{
  animation:valueIn .65s cubic-bezier(.2,.8,.2,1) both;
}

.value.exit{
  animation:valueOut .65s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes valueIn{
  from{
    opacity:0;
    transform:translate(-50%, calc(-50% + 24px)) scale(.94);
    filter:blur(10px);
  }
  to{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
    filter:blur(0);
  }
}

@keyframes valueOut{
  from{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
    filter:blur(0);
  }
  to{
    opacity:0;
    transform:translate(-50%, calc(-50% - 24px)) scale(1.03);
    filter:blur(10px);
  }
}

.label{
  margin-top:8px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
}

.sep{
  position:absolute;
  right:-10px;
  top:50%;
  transform:translateY(-50%);
  width:1px;
  height:48px;
  background:linear-gradient(180deg, transparent, rgba(255,255,255,0.12), transparent);
}

.footer-note{
  margin-top:24px;
  text-align:center;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.34);
}

@media (max-width:900px){
  .card{padding:34px 24px 30px;border-radius:30px}
  .timer{gap:8px}
  .value-wrap{height:100px}
  .sep{display:none}
}

@media (max-width:680px){
  .wrap{width:min(100vw - 20px, 720px);padding:10px}
  .timer{
    grid-template-columns:repeat(2,minmax(0,1fr));
    row-gap:18px;
    column-gap:8px;
  }
  .value-wrap{height:88px}
  .title{margin-bottom:18px}
  .label{letter-spacing:.14em}
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">До Нового года</h1>

      <div class="timer">
        <div class="unit">
          <div class="value-wrap" id="daysWrap"><div class="value" id="days">000</div></div>
          <div class="label">Дней</div>
          <div class="sep"></div>
        </div>
        <div class="unit">
          <div class="value-wrap" id="hoursWrap"><div class="value" id="hours">00</div></div>
          <div class="label">Часов</div>
          <div class="sep"></div>
        </div>
        <div class="unit">
          <div class="value-wrap" id="minutesWrap"><div class="value" id="minutes">00</div></div>
          <div class="label">Минут</div>
          <div class="sep"></div>
        </div>
        <div class="unit">
          <div class="value-wrap" id="secondsWrap"><div class="value" id="seconds">00</div></div>
          <div class="label">Секунд</div>
        </div>
      </div>
    </div>
  </div>

<script>
const units = {
  days: document.getElementById('daysWrap'),
  hours: document.getElementById('hoursWrap'),
  minutes: document.getElementById('minutesWrap'),
  seconds: document.getElementById('secondsWrap')
};

const values = {
  days: '000',
  hours: '00',
  minutes: '00',
  seconds: '00'
};

function pad2(n){
  return String(n).padStart(2,'0');
}

function transitionValue(key, nextValue){
  if(values[key] === nextValue) return;

  const wrap = units[key];
  const current = wrap.querySelector('.value:last-child');
  const next = document.createElement('div');
  next.className = 'value enter';
  next.textContent = nextValue;

  if(current){
    current.classList.remove('enter');
    current.classList.add('exit');
    current.addEventListener('animationend', () => current.remove(), { once:true });
  }

  wrap.appendChild(next);
  values[key] = nextValue;
}

function updateCountdown(){
  const now = new Date();
  const nextYear = new Date(now.getFullYear() + 1, 0, 1, 0, 0, 0, 0);
  const diff = Math.max(0, nextYear - now);

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  transitionValue('days', String(days).padStart(3,'0'));
  transitionValue('hours', pad2(hours));
  transitionValue('minutes', pad2(minutes));
  transitionValue('seconds', pad2(seconds));
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
